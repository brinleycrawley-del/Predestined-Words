<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Predestined Words</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Write whatever is on your heart. Exercise your freedom to think.</h1>

    <textarea id="poemInput" placeholder="Begin your poem..."></textarea>

    <div class="output-container">
      <div class="column">
        <h3>Original</h3>
        <div id="originalOutput"></div>
      </div>

      <div class="column">
        <h3>System Output</h3>
        <div id="systemOutput"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
